name: Security Scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: "0 8 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # CodeQL: static analysis for Go and JavaScript/TypeScript
  # ─────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript-typescript]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Create go.work for CodeQL (monorepo)
        if: matrix.language == 'go'
        run: echo 'use ./backend' > go.work

      - name: Autobuild (for Go)
        if: matrix.language == 'go'
        uses: github/codeql-action/autobuild@v4

      - name: Set up Node.js (for JS/TS analysis)
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm (for JS/TS analysis)
        if: matrix.language == 'javascript-typescript'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies (for JS/TS analysis)
        if: matrix.language == 'javascript-typescript'
        run: pnpm install --frozen-lockfile

      - name: Autobuild (for JS/TS)
        if: matrix.language == 'javascript-typescript'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

  # ─────────────────────────────────────────────────────────────
  # Trivy: vulnerability scanning for filesystems and containers
  # ─────────────────────────────────────────────────────────────
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy on filesystem (Go + Node dependencies)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy filesystem scan results
        if: success()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

  trivy-backend-image:
    name: Trivy Backend Docker Image Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t snorlx-backend:ci .
        working-directory: backend

      - name: Run Trivy on backend image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: snorlx-backend:ci
          format: sarif
          output: trivy-backend-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy backend image scan results
        if: success()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend-image.sarif
          category: trivy-backend-image

  trivy-frontend-image:
    name: Trivy Frontend Docker Image Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: docker build -f frontend/Dockerfile -t snorlx-frontend:ci .

      - name: Run Trivy on frontend image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: snorlx-frontend:ci
          format: sarif
          output: trivy-frontend-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy frontend image scan results
        if: success()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend-image.sarif
          category: trivy-frontend-image

  # ─────────────────────────────────────────────────────────────
  # Dependency review: flag newly introduced vulnerable deps on PRs
  # ─────────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ─────────────────────────────────────────────────────────────
  # Go security: govulncheck and gosec
  # ─────────────────────────────────────────────────────────────
  go-security:
    name: Go Security (govulncheck + gosec)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -fmt sarif -out gosec-results.sarif ./...
        continue-on-error: true

      - name: Upload gosec results
        if: hashFiles('backend/gosec-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend/gosec-results.sarif
          category: gosec

  # ─────────────────────────────────────────────────────────────
  # npm audit: check for known vulnerabilities in Node packages
  # ─────────────────────────────────────────────────────────────
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (frontend)
        run: pnpm --filter snorlx-frontend audit --audit-level=high
        continue-on-error: true

      - name: Run pnpm audit (root)
        run: pnpm audit --audit-level=high
        continue-on-error: true
