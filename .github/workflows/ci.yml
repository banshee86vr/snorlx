name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend: vet, test (with race detector), and build
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with race detector
        run: go test ./... -race -count=1 -timeout=120s -coverprofile=coverage.out -covermode=atomic

      - name: Print coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7

      - name: Build binary
        run: go build -o dist/server ./cmd/server

  # ─────────────────────────────────────────────────────────────
  # Frontend: lint, test (with coverage), and build
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React/TypeScript)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint
        run: pnpm --filter snorlx-frontend lint
        working-directory: .

      - name: Run tests with coverage
        run: pnpm --filter snorlx-frontend test:coverage
        working-directory: .

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7
          if-no-files-found: ignore

      - name: Build
        run: pnpm --filter snorlx-frontend build
        working-directory: .
        env:
          VITE_API_URL: ""
