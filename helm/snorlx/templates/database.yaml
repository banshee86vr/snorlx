{{- if .Values.database.internal }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "snorlx.fullname" . }}-db
  labels:
    {{- include "snorlx.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  serviceName: {{ include "snorlx.fullname" . }}-db
  replicas: 1
  selector:
    matchLabels:
      {{- include "snorlx.database.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "snorlx.database.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: timescaledb
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          imagePullPolicy: {{ .Values.database.image.pullPolicy }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "snorlx.fullname" . }}-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: snorlx
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.database.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.database.storage.storageClass }}
        storageClassName: {{ .Values.database.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.database.storage.size }}
{{- end }}

