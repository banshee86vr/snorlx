services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # POSTGRES_PASSWORD must be set in your .env file
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/snorlx?sslmode=disable
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      # DEV_MODE=true bypasses OAuth credential validation — safe for local dev only
      - DEV_MODE=${DEV_MODE:-false}
      - PORT=8080
      - LOG_LEVEL=info
      - FRONTEND_URL=http://localhost:5173
    ports:
      - "3001:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=http://localhost:8081
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    # Pin to a specific patch version to avoid unintended upgrades
    image: timescale/timescaledb:2.26.0-pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=snorlx
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Restrict DB port to localhost only — do not expose to all network interfaces
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:

